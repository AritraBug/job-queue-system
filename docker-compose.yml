version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: job-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobdb
    ports:
      - "3306:3306"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: job-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"